services:
  # Backend Web Service
  - type: web
    name: personal-finance-tracker-api
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # User will provide this
      - key: JWT_SECRET
        generateValue: true # Render will generate a secure one for the user!
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: 12
      - key: ALLOWED_ORIGINS
        value: "*"

  # Frontend Static Site
  - type: static
    name: personal-finance-tracker-ui
    runtime: static
    plan: free
    publishPath: frontend/dist
    buildCommand: cd frontend && npm install && npm run build
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: personal-finance-tracker-api
          property: url
